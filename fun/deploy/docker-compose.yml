version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: link-junction-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: link-junction-tattoos

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: link-junction-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/link-junction-tattoos
      - FRONTEND_URL=http://localhost:3000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: link-junction-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data: